<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Crawler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 48px 20px;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    /* header */
    .page-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #dde3ea;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #111;
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .tech-pills {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .pill-blue   { background: #dbeafe; color: #1d4ed8; }
    .pill-green  { background: #dcfce7; color: #15803d; }
    .pill-purple { background: #ede9fe; color: #6d28d9; }

    /* card */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* textarea */
    textarea {
      width: 100%;
      height: 130px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      transition: border-color 0.15s;
      line-height: 1.7;
    }

    textarea:focus { border-color: #3b82f6; background: #fff; }

    /* controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .concurrency-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .concurrency-group label {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 64px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      text-align: center;
      outline: none;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus { border-color: #3b82f6; }

    .url-count {
      font-size: 12px;
      color: #999;
      font-family: monospace;
      margin-left: auto;
    }

    /* button */
    .btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-primary:hover   { background: #1d4ed8; }
    .btn-primary:active  { transform: scale(0.98); }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: none;
      color: #555;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #f0f4f8; }

    /* error */
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #dc2626;
      margin-top: 12px;
      display: none;
    }

    /* status / loading */
    .status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      font-size: 13px;
      color: #555;
    }

    .status-bar.visible { display: flex; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #dbeafe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* progress bar */
    .progress-track {
      height: 3px;
      background: #e2e8f0;
      border-radius: 99px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-track.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* results */
    .results-wrap {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .results-wrap.visible {
      display: block;
    }

    .results-wrap.animated {
      opacity: 1;
      transform: translateY(0);
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .results-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    /* stat row */
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      min-width: 100px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      font-family: monospace;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .num-blue   { color: #2563eb; }
    .num-green  { color: #16a34a; }
    .num-red    { color: #dc2626; }
    .num-amber  { color: #d97706; }

    /* table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr { transition: background 0.1s; }
    tr:hover td { background: #f8fafc; }

    .url-cell {
      font-family: monospace;
      font-size: 12px;
      color: #334155;
      word-break: break-all;
      max-width: 260px;
    }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-ok     { background: #dcfce7; color: #15803d; }
    .badge-error  { background: #fef2f2; color: #dc2626; }
    .badge-skip   { background: #fef9c3; color: #a16207; }

    .time-cell  { font-family: monospace; color: #64748b; white-space: nowrap; }
    .title-cell { color: #475569; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">

  <!-- page header -->
  <div class="page-header">
    <h1>Concurrent Web Crawler</h1>
    <p>Fetches multiple URLs in parallel — bounded by a hand-rolled Semaphore, protected by a Circuit Breaker.</p>
    <div class="tech-pills">
      <span class="pill pill-blue">Semaphore</span>
      <span class="pill pill-green">Circuit Breaker</span>
      <span class="pill pill-purple">Promise.all</span>
    </div>
  </div>

  <!-- input card -->
  <div class="card">
    <div class="card-title">URLs to crawl</div>
    <textarea
      id="url-input"
      placeholder="https://example.com
https://github.com
https://wikipedia.org
One URL per line..."
      spellcheck="false"
    ></textarea>

    <div class="controls">
      <div class="concurrency-group">
        <label for="concurrency">Workers</label>
        <input type="number" id="concurrency" value="5" min="1" max="20" />
      </div>
      <span class="url-count" id="url-count"></span>
      <button class="btn-primary" id="crawl-btn" onclick="startCrawl()">Start crawl</button>
    </div>
  </div>

  <div class="error" id="error"></div>

  <!-- loading state -->
  <div class="status-bar" id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Starting...</span>
  </div>

  <div class="progress-track" id="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- results -->
  <div class="results-wrap" id="results-wrap">
    <div class="results-header">
      <h2>Results</h2>
      <button class="btn-secondary" onclick="resetAll()">New crawl</button>
    </div>

    <div class="stat-row" id="stat-row"></div>

    <table>
      <thead>
        <tr>
          <th>URL</th>
          <th>Status</th>
          <th>Time</th>
          <th>Title</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>

</div>
<script>
  let pollInterval = null;

  document.getElementById('url-input').addEventListener('input', function() {
    const urls = parseUrls();
    const el = document.getElementById('url-count');
    el.textContent = urls.length > 0 ? urls.length + ' URL' + (urls.length > 1 ? 's' : '') : '';
  });

  function parseUrls() {
    return document.getElementById('url-input').value
      .split('\n')
      .map(function(u) { return u.trim(); })
      .filter(function(u) { return u.length > 0; });
  }

  function showError(msg) {
    var el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error').style.display = 'none';
  }

  function setStatus(msg) {
    var bar = document.getElementById('status-bar');
    var txt = document.getElementById('status-text');
    if (msg) {
      txt.textContent = msg;
      bar.classList.add('visible');
    } else {
      bar.classList.remove('visible');
    }
  }

  function setProgress(done, total) {
    var track = document.getElementById('progress-track');
    var fill  = document.getElementById('progress-fill');
    if (total === 0) return;
    track.classList.add('visible');
    fill.style.width = Math.round((done / total) * 100) + '%';
  }

  async function startCrawl() {
    var urls        = parseUrls();
    var concurrency = parseInt(document.getElementById('concurrency').value) || 5;

    hideError();

    if (urls.length === 0) {
      showError('Enter at least one URL.');
      return;
    }

    document.getElementById('crawl-btn').disabled = true;
    document.getElementById('results-wrap').classList.remove('visible', 'animated');
    setStatus('Starting crawl...');
    setProgress(0, urls.length);

    var jobId;
    try {
      var res  = await fetch('/crawl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: urls, concurrency: concurrency })
      });
      var data = await res.json();
      if (!data.jobId) throw new Error(data.error || 'No jobId returned');
      jobId = data.jobId;
    } catch (err) {
      showError('Could not start crawl: ' + err.message);
      document.getElementById('crawl-btn').disabled = false;
      setStatus('');
      return;
    }

    pollInterval = setInterval(async function() {
      try {
        var res  = await fetch('/results/' + jobId);
        var data = await res.json();

        setProgress(data.results.length, data.total);
        setStatus('Processed ' + data.results.length + ' of ' + data.total + ' URLs...');

        if (data.status === 'done') {
          clearInterval(pollInterval);
          setStatus('');
          document.getElementById('progress-track').classList.remove('visible');
          document.getElementById('crawl-btn').disabled = false;
          renderResults(data.results);
        }
      } catch (err) {
        clearInterval(pollInterval);
        showError('Polling error: ' + err.message);
        document.getElementById('crawl-btn').disabled = false;
        setStatus('');
      }
    }, 800);
  }

  function renderResults(results) {
    var success = results.filter(function(r) { return typeof r.status === 'number'; }).length;
    var errors  = results.filter(function(r) { return r.status === 'error'; }).length;
    var skipped = results.filter(function(r) { return r.status === 'skipped'; }).length;

    var times = results
      .filter(function(r) { return r.responseTime; })
      .map(function(r) { return parseInt(r.responseTime); });
    var avgTime = times.length ? Math.round(times.reduce(function(a,b){return a+b;},0) / times.length) : null;

    document.getElementById('stat-row').innerHTML =
      '<div class="stat-box"><div class="stat-number num-blue">'  + results.length + '</div><div class="stat-label">Total</div></div>' +
      '<div class="stat-box"><div class="stat-number num-green">' + success        + '</div><div class="stat-label">OK</div></div>'    +
      '<div class="stat-box"><div class="stat-number num-red">'   + errors         + '</div><div class="stat-label">Errors</div></div>'  +
      '<div class="stat-box"><div class="stat-number num-amber">' + skipped        + '</div><div class="stat-label">Skipped</div></div>' +
      (avgTime !== null ? '<div class="stat-box"><div class="stat-number">' + avgTime + 'ms</div><div class="stat-label">Avg time</div></div>' : '');

    var tbody = document.getElementById('results-body');
    tbody.innerHTML = '';

    results.forEach(function(r) {
      var isOk      = typeof r.status === 'number';
      var isError   = r.status === 'error';

      var badgeClass = isOk ? 'badge-ok' : isError ? 'badge-error' : 'badge-skip';
      var badgeText  = isOk ? r.status : r.status;

      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="url-cell">'  + esc(r.url) + '</td>' +
        '<td><span class="badge ' + badgeClass + '">' + esc(String(badgeText)) + '</span></td>' +
        '<td class="time-cell">' + esc(r.responseTime || r.reason || '—') + '</td>' +
        '<td class="title-cell">'+ esc(r.title || '—') + '</td>';
      tbody.appendChild(tr);
    });

    var wrap = document.getElementById('results-wrap');
    wrap.classList.add('visible');
    setTimeout(function() { wrap.classList.add('animated'); }, 10);
  }

  function resetAll() {
    if (pollInterval) clearInterval(pollInterval);
    var wrap = document.getElementById('results-wrap');
    wrap.classList.remove('visible', 'animated');
    document.getElementById('crawl-btn').disabled = false;
    document.getElementById('progress-track').classList.remove('visible');
    document.getElementById('progress-fill').style.width = '0%';
    hideError();
    setStatus('');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
